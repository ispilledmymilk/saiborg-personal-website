server {
    # Listen to port 443 on both IPv4 and IPv6.
    listen 443 ssl default_server reuseport;
    listen [::]:443 ssl default_server reuseport;

    server_name saiborg.duckdns.org;

    # Load the certificate files.
    ssl_certificate         /etc/letsencrypt/live/saiborg.duckdns.org/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/saiborg.duckdns.org/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/saiborg.duckdns.org/chain.pem;

    # Load Diffie-Hellman parameter.
    ssl_dhparam /etc/letsencrypt/dhparams/dhparam.pem;

    # A path relative to your mount point at /var/www (see docker-compose).
    location / {
        proxy_pass http://myportfolio:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
