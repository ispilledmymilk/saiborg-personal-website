<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ profile.headline }}">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/logo.svg') }}" type="image/svg+xml">
    <title>{{ title }}</title>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="{{ url_for('index') }}" class="nav-brand">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Logo">
                <span>{{ profile.name.split()[0] }}</span>
            </a>
            <nav>
                <ul class="nav-links">
                    {% for page in pages %}
                    <li>
                        <a href="{{ url_for(page.endpoint) }}"
                           class="{% if request.endpoint == page.endpoint %}active{% endif %}">
                            {{ page.label }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <a class="btn btn-primary footer-cta"
           href="{{ profile.book_call }}"
           target="_blank"
           rel="noopener">
            Book a call
        </a>
        <p>&copy; 2026 {{ profile.name }} · Built with Flask</p>
        <div class="footer-links">
            <a href="{{ profile.github }}" target="_blank" rel="noopener">GitHub</a>
            <a href="{{ profile.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
            <a href="{{ profile.portfolio }}" target="_blank" rel="noopener">Astro Portfolio</a>
        </div>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
